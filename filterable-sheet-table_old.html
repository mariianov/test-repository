<!-- =====================================================================
  Filterable Google Sheet Table — embeddable snippet
  ---------------------------------------------------------------------
  HOW TO USE:
  1. In Google Sheets: File → Share → Publish to web → select your sheet
     tab → format "Comma-separated values (.csv)" → Publish. Copy the URL.
  2. Paste that URL into SHEET_CSV_URL below.
  3. Paste this entire block into a WordPress "Custom HTML" block.
===================================================================== -->

<div id="fst-root" class="fst-wrap">
  <div id="fst-filters" class="fst-filters"></div>
  <div class="fst-search">
    <input id="fst-search-input" type="text" placeholder="Search all columns…" autocomplete="off" />
  </div>
  <div class="fst-meta">
    <span id="fst-count"></span>
    <button id="fst-reset" class="fst-reset" type="button">Clear filters</button>
  </div>
  <div class="fst-table-scroll">
    <table id="fst-table" class="fst-table">
      <thead id="fst-thead"></thead>
      <tbody id="fst-tbody"></tbody>
    </table>
  </div>
  <div id="fst-empty" class="fst-empty" hidden>No rows match the current filters.</div>
  <div id="fst-pagination" class="fst-pagination">
    <button id="fst-prev" class="fst-page-btn" type="button" aria-label="Previous page">&larr;</button>
    <span id="fst-page-label"></span>
    <button id="fst-next" class="fst-page-btn" type="button" aria-label="Next page">&rarr;</button>
  </div>
  <div>
    <p>By Mariia Novoselia. <a href="#" target="_blank">Read methodology.</a></p>
  </div>
</div>

<style>
  .fst-wrap {
    --fst-ink: #1c2024;
    --fst-muted: #6b7280;
    --fst-line: #e3e6ea;
    --fst-accent: #2f6f4f;
    --fst-accent-bg: #eaf3ee;
    --fst-bg-head: #f7f8f9;
    /* <!-- ADJUST DROPDOWN CORNER ROUNDING HERE --> */
    --fst-radius: 8px; 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--fst-ink);
    font-size: 14px;
    /* <!-- WIDGET WIDTH: capped to 90% of the viewport and centered --> */
    width: 90vw;
    max-width: 90vw;
    margin: 0 auto;
    box-sizing: border-box;
  }
  .fst-wrap *, .fst-wrap *::before, .fst-wrap *::after { box-sizing: border-box; }

  .fst-search {
    margin-bottom: 14px;
  }
  .fst-search input {
    width: 100%;
    max-width: 360px;
    font-size: 14px;
    padding: 8px 12px;
    border: 1px solid var(--fst-line);
    border-radius: var(--fst-radius);
    background: #fff;
    color: var(--fst-ink);
  }
  .fst-search input:focus {
    outline: 2px solid var(--fst-accent);
    outline-offset: 1px;
  }

  .fst-filters {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 16px;
  }
  .fst-filter-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .fst-filter-group-label {
    font-weight: 700;
    font-size: 13px;
    color: var(--fst-ink);
  }
  .fst-pill-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .fst-pill {
    --pill-color: #6b7280;
    border: 1.5px solid var(--pill-color);
    border-radius: 999px;
    padding: 5px 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    background: #fff;
    color: var(--fst-ink);
    transition: background 0.15s ease, color 0.15s ease;
  }
  .fst-pill:hover { opacity: 0.85; }
  .fst-pill.selected {
    background: var(--pill-color);
    color: #fff;
  }
  .fst-pill:focus-visible {
    outline: 2px solid var(--fst-accent);
    outline-offset: 2px;
  }

  /* Source text in "(...)" at the end of a column name — italic, muted gray */
  .fst-col-source {
    font-style: italic;
    color: #6f6f6f;
  }

  .fst-cell-link {
    text-decoration: none;
    color: #022333;
    font-weight: 700;
  }

  .fst-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
    color: var(--fst-muted);
    font-size: 13px;
  }
  .fst-reset {
    border: 1px solid var(--fst-line);
    background: #fff;
    color: var(--fst-ink);
    border-radius: var(--fst-radius);
    padding: 5px 12px;
    cursor: pointer;
    font-size: 13px;
  }
  .fst-reset:hover { background: var(--fst-bg-head); }

  .fst-table-scroll {
    overflow-x: auto;
    /* <!-- OUTER BORDER REMOVED: Changed to none so the table doesn't have a rounded box container --> */
    border: none;
    border-radius: 0;
  }
  .fst-table {
    width: 100%;
    border-collapse: collapse;
    /* <!-- WRAPPING: fixed layout + word-wrap makes long headers/cells wrap instead of stretching the table --> */
    table-layout: fixed;
    white-space: normal;
    word-wrap: break-word;
  }
  .fst-table th, .fst-table td {
    padding: 9px 12px;
    text-align: left;
    overflow-wrap: break-word;
    /* <!-- HORIZONTAL ROW LINES: This keeps only the bottom horizontal line visible for each cell --> */
    border-bottom: 1px solid var(--fst-line);
  }
  .fst-table th {
    background: var(--fst-bg-head);
    font-weight: 600;
    position: sticky;
    top: 0;
    cursor: pointer;
    user-select: none;
    /* <!-- BOLD HEADER SEPARATOR: This line separates column names from row cells. Adjust '2px' to make it thicker/thinner --> */
    border-bottom: 2px solid var(--fst-ink);
  }
  .fst-table th:hover { background: var(--fst-accent-bg); }
  .fst-table tbody tr:hover { background: #fafbfc; }

  .fst-empty {
    padding: 20px;
    text-align: center;
    color: var(--fst-muted);
  }

  .fst-loading {
    padding: 16px;
    color: var(--fst-muted);
  }

  .fst-pagination {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-top: 14px;
    color: var(--fst-muted);
    font-size: 13px;
  }
  .fst-page-btn {
    border: 1px solid var(--fst-line);
    background: #fff;
    color: var(--fst-ink);
    border-radius: var(--fst-radius);
    padding: 5px 12px;
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
  }
  .fst-page-btn:hover:not(:disabled) { background: var(--fst-bg-head); }
  .fst-page-btn:disabled { opacity: 0.4; cursor: default; }

  @media (max-width: 600px) {
    .fst-pill { padding: 5px 12px; font-size: 12px; }
  }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script>
(function () {
  // ---------- CONFIG: edit these two lines ----------
  const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ23eH-VC8KZcjNSPUmDudueiZlKWKV8cLwfkvyZj3v4L62U502umL96fhlm3BGOfKcsoYdJ_8ekI9P/pub?gid=0&single=true&output=csv";
  const FILTER_COLUMNS = ["ecosystem", "status", "Visibility score (Park search)"]; // e.g. ["category", "status"]

  // Numeric columns to group into range "buckets" instead of listing every unique
  // value. Key = exact column name (case-sensitive, must match your sheet header),
  // value = bucket size. e.g. "visibility": 20 turns 76, 42, 11, 99... into pills
  // labeled 0–20, 21–40, 41–60, 61–80, 81–100 (generated automatically from your data).
  const BUCKET_FILTERS = { "Visibility score (Park search)": 20 };

  // Custom pill ordering per column, overriding the default alphabetical sort.
  // Key = exact column name (case-sensitive, must match your sheet header).
  // Values not listed here fall to the end, alphabetically among themselves.
  const CUSTOM_PILL_ORDER = {
    "status": ["active", "merger", "acquired", "defunct"]
  };
  // ----------------------------------------------------

  // ---------- COLOR SCALE & CONDITIONAL CONFIGURATION ----------
  // <!-- CHANGE SCORE GRADIENT COLORS HERE -->
  const SCORE_COLOR_LOW = { r: 240, g: 244, b: 247 }; // #f0f4f7 (off-white blueish)
  const SCORE_COLOR_HIGH = { r: 8, g: 72, b: 103 }; // #084867 (lighter dark blue)
 // const SCORE_COLOR_HIGH = { r: 2, g: 35, b: 51 };    // #022333 (deep dark blue)


  // <!-- CHANGE STATUS TEXT COLORS HERE -->
  const STATUS_COLORS = {
    "active": "green",
    "defunct": "red",
    "acquired": "orange",
    "merger": "brown"
  };

  // <!-- PILL FILTER COLORS: cycles through these, one color per filter column -->
  const PILL_PALETTE = ["#0D6B98", "#03E26D", "#022333"];
  // --------------------------------------------------------------

  const root = document.getElementById("fst-root");
  const filtersEl = document.getElementById("fst-filters");
  const theadEl = document.getElementById("fst-thead");
  const tbodyEl = document.getElementById("fst-tbody");
  const countEl = document.getElementById("fst-count");
  const emptyEl = document.getElementById("fst-empty");
  const resetBtn = document.getElementById("fst-reset");
  const prevBtn = document.getElementById("fst-prev");
  const nextBtn = document.getElementById("fst-next");
  const pageLabelEl = document.getElementById("fst-page-label");
  const searchInput = document.getElementById("fst-search-input");

  const ROWS_PER_PAGE = 20;
  let currentPage = 1;
  let searchTerm = "";

  let columns = [];
  let rows = [];
  let activeFilters = {};   
  let sortState = { col: null, dir: 1 };
  let scoreMin = 0;
  let scoreMax = 0;
  let bucketRangesByCol = {}; // col -> [{ label, min, max }, ...], only set for BUCKET_FILTERS columns
 
  function loadingMsg(msg) {
    tbodyEl.innerHTML = `<tr><td class="fst-loading">${msg}</td></tr>`;
  }
 
  loadingMsg("Loading data…");
 
  Papa.parse(SHEET_CSV_URL, {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete: function (results) {
      if (!results.data.length) {
        loadingMsg("No data found in sheet.");
        return;
      }
      columns = results.meta.fields;
      rows = results.data;
 
      // Calculate Min and Max scores dynamically from the dataset
      calculateScoreBounds();
 
      // <!-- DEFAULT FILTER LOGIC: Set 'status' to 'active' on load if the column exists -->
      const statusCol = columns.find(c => c.toLowerCase() === "status");
      if (statusCol) {
        activeFilters[statusCol] = new Set(["active"]);
      }

      // <!-- DEFAULT SORT: sort by 'score' descending on load, if that column exists -->
      const scoreCol = columns.find(c => c.toLowerCase() === "score");
      if (scoreCol) {
        sortState = { col: scoreCol, dir: -1 };
      }

      init();
    },
    error: function (err) {
      loadingMsg("Could not load the sheet. Check that SHEET_CSV_URL is a valid published CSV link.");
      console.error(err);
    }
  });
 
  function init() {
    buildFilters();
    buildHeader();
    render();
  }
 
  function calculateScoreBounds() {
    const scoreCol = columns.find(c => c.toLowerCase() === "score");
    if (!scoreCol) return;
    let values = rows.map(r => parseFloat(r[scoreCol])).filter(v => !isNaN(v));
    if (values.length) {
      scoreMin = Math.min(...values);
      scoreMax = Math.max(...values);
    }
  }
 
  // Helper function to capitalize the first letter of strings
  function capitalizeFirstLetter(str) {
    if (!str) return "";
    return str.charAt(0).toUpperCase() + str.slice(1);
  }

  // Sorts values by a specified custom order (case-insensitive match); anything
  // not found in the order list falls to the end, sorted alphabetically among itself.
  function sortByCustomOrder(values, order) {
    const orderMap = {};
    order.forEach((v, i) => { orderMap[v.toLowerCase()] = i; });
    return values.slice().sort((a, b) => {
      const ai = Object.prototype.hasOwnProperty.call(orderMap, a.toLowerCase()) ? orderMap[a.toLowerCase()] : Infinity;
      const bi = Object.prototype.hasOwnProperty.call(orderMap, b.toLowerCase()) ? orderMap[b.toLowerCase()] : Infinity;
      if (ai !== bi) return ai - bi;
      return a.localeCompare(b, undefined, { numeric: true });
    });
  }

  // Builds range buckets of the given size, starting at 0, covering up through the
  // highest value present. size=20 over values up to 99 gives:
  // [0–20], [21–40], [41–60], [61–80], [81–100]
  function computeBucketRanges(values, size) {
    if (!values.length) return [];
    const maxVal = Math.max(...values);
    const numBuckets = maxVal <= size ? 1 : Math.floor((maxVal - 1) / size) + 1;
    const buckets = [];
    for (let k = 0; k < numBuckets; k++) {
      const min = k === 0 ? 0 : k * size + 1;
      const max = (k + 1) * size;
      buckets.push({ label: `${min}\u2013${max}`, min, max });
    }
    return buckets;
  }

  // Splits "Revenue (Crunchbase)" into { main: "Revenue", source: "(Crunchbase)" }.
  // If there's no trailing "(...)", source is "".
  function splitColumnLabel(label) {
    const match = label.match(/^(.*?)\s*(\([^)]*\))\s*$/);
    if (!match) return { main: label, source: "" };
    return { main: match[1], source: match[2] };
  }

  // Appends a column's label to an element as DOM nodes (never innerHTML): plain
  // text for the main name, plus an italic muted-gray span for any "(source)" suffix.
  function appendColumnLabel(el, rawCol) {
    const { main, source } = splitColumnLabel(capitalizeFirstLetter(rawCol));
    el.appendChild(document.createTextNode(main));
    if (source) {
      const span = document.createElement("span");
      span.className = "fst-col-source";
      span.textContent = (main ? " " : "") + source;
      el.appendChild(span);
    }
  }
 
  // Parses a strict markdown-style link: [Label](https://domain.com)
  // Returns { label, url } if it matches, or null otherwise. Only ever used to
  // build a real <a> element from these two extracted values — never via innerHTML.
  function parseMarkdownLink(text) {
    const match = text.match(/^\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)$/);
    if (!match) return null;
    return { label: match[1], url: match[2] };
  }
 
  function buildFilters() {
    const filterCols = FILTER_COLUMNS.length ? FILTER_COLUMNS : columns;
    filtersEl.innerHTML = "";
    filterCols.forEach((col, colIndex) => {
      if (!columns.includes(col)) return;

      const isBucketed = Object.prototype.hasOwnProperty.call(BUCKET_FILTERS, col);
      let pillValues; // array of strings shown/used as pill values

      if (isBucketed) {
        const numericValues = rows.map(r => parseFloat(r[col])).filter(v => !isNaN(v));
        const ranges = computeBucketRanges(numericValues, BUCKET_FILTERS[col]);
        bucketRangesByCol[col] = ranges;
        pillValues = ranges.map(r => r.label);
      } else {
        pillValues = Array.from(new Set(rows.map(r => (r[col] ?? "").toString().trim()).filter(v => v !== "")))
          .sort((a, b) => a.localeCompare(b, undefined, { numeric: true }));
        if (CUSTOM_PILL_ORDER[col]) {
          pillValues = sortByCustomOrder(pillValues, CUSTOM_PILL_ORDER[col]);
        }
      }

      const color = PILL_PALETTE[colIndex % PILL_PALETTE.length];

      const group = document.createElement("div");
      group.className = "fst-filter-group";

      const groupLabel = document.createElement("div");
      groupLabel.className = "fst-filter-group-label";
      appendColumnLabel(groupLabel, col);

      const pillRow = document.createElement("div");
      pillRow.className = "fst-pill-row";

      pillValues.forEach(val => {
        const pill = document.createElement("button");
        pill.type = "button";
        pill.className = "fst-pill";
        pill.style.setProperty("--pill-color", color);
        pill.textContent = val;

        const isSelected = activeFilters[col] && activeFilters[col].has(val);
        if (isSelected) pill.classList.add("selected");

        pill.addEventListener("click", () => {
          if (!activeFilters[col]) activeFilters[col] = new Set();
          if (activeFilters[col].has(val)) {
            activeFilters[col].delete(val);
            if (activeFilters[col].size === 0) delete activeFilters[col];
          } else {
            activeFilters[col].add(val);
          }
          pill.classList.toggle("selected");
          currentPage = 1;
          render();
        });

        pillRow.appendChild(pill);
      });

      group.appendChild(groupLabel);
      group.appendChild(pillRow);
      filtersEl.appendChild(group);
    });
  }
 
  function buildHeader() {
    const tr = document.createElement("tr");
    columns.forEach(col => {
      const th = document.createElement("th");
      appendColumnLabel(th, col);
      th.addEventListener("click", () => {
        sortState = sortState.col === col ? { col, dir: -sortState.dir } : { col, dir: 1 };
        currentPage = 1;
        render();
      });
      tr.appendChild(th);
    });
    theadEl.innerHTML = "";
    theadEl.appendChild(tr);
  }
 
  function rowMatchesSearch(row) {
    if (!searchTerm) return true;
    return columns.some(col => (row[col] ?? "").toString().toLowerCase().includes(searchTerm));
  }

  function getFilteredRows() {
    return rows.filter(row =>
      rowMatchesSearch(row) &&
      Object.entries(activeFilters).every(([col, valSet]) => {
        if (!valSet || valSet.size === 0) return true;

        if (bucketRangesByCol[col]) {
          const num = parseFloat(row[col]);
          if (isNaN(num)) return false;
          const bucket = bucketRangesByCol[col].find(b => num >= b.min && num <= b.max);
          return bucket ? valSet.has(bucket.label) : false;
        }

        return valSet.has((row[col] ?? "").toString().trim());
      })
    );
  }
 
  // Computes background color mix based on score sliding scale percentage
  function getScoreStyle(valStr) {
    const val = parseFloat(valStr);
    if (isNaN(val) || scoreMax === scoreMin) return "";
    
    // Normalize value to a 0 - 1 factor
    const factor = (val - scoreMin) / (scoreMax - scoreMin);
    
    // Mix low and high RGB profiles
    const r = Math.round(SCORE_COLOR_LOW.r + factor * (SCORE_COLOR_HIGH.r - SCORE_COLOR_LOW.r));
    const g = Math.round(SCORE_COLOR_LOW.g + factor * (SCORE_COLOR_HIGH.g - SCORE_COLOR_LOW.g));
    const b = Math.round(SCORE_COLOR_LOW.b + factor * (SCORE_COLOR_HIGH.b - SCORE_COLOR_LOW.b));
    
    // Determine a text color fallback (white text if background is very dark)
    const textCol = factor > 0.5 ? "#ffffff" : "var(--fst-ink)";
    
    return `background-color: rgb(${r},${g},${b}); color: ${textCol}; font-weight: 600;`;
  }
 
  function render() {
    let filtered = getFilteredRows();
 
    if (sortState.col) {
      const col = sortState.col, dir = sortState.dir;
      filtered = filtered.slice().sort((a, b) => {
        const av = (a[col] ?? "").toString(), bv = (b[col] ?? "").toString();
        const an = parseFloat(av), bn = parseFloat(bv);
        if (!isNaN(an) && !isNaN(bn) && av.trim() !== "" && bv.trim() !== "") return (an - bn) * dir;
        return av.localeCompare(bv, undefined, { numeric: true }) * dir;
      });
    }
 
    tbodyEl.innerHTML = "";
    if (!filtered.length) {
      emptyEl.hidden = false;
      currentPage = 1;
    } else {
      emptyEl.hidden = true;

      // <!-- PAGINATION: clamp current page, then slice out just this page's rows -->
      const totalPages = Math.max(1, Math.ceil(filtered.length / ROWS_PER_PAGE));
      if (currentPage > totalPages) currentPage = totalPages;
      if (currentPage < 1) currentPage = 1;
      const startIdx = (currentPage - 1) * ROWS_PER_PAGE;
      const pageRows = filtered.slice(startIdx, startIdx + ROWS_PER_PAGE);

      const frag = document.createDocumentFragment();
      pageRows.forEach(row => {
        const tr = document.createElement("tr");
        columns.forEach(col => {
          const td = document.createElement("td");
          const cellValue = (row[col] ?? "").toString().trim();
          const normalizedColName = col.toLowerCase();
 
          // <!-- LINK & CELL RENDERING ENGINE -->
          // 1. If column is 'score', map background color using our interpolation logic
          if (normalizedColName === "score") {
            td.style.cssText = getScoreStyle(cellValue);
            td.textContent = cellValue;
          } 
          // 2. If column is 'status', modify the text color conditionally
          else if (normalizedColName === "status") {
            const statusKey = cellValue.toLowerCase();
            if (STATUS_COLORS[statusKey]) {
              td.style.cssText = `color: ${STATUS_COLORS[statusKey]}; font-weight: 600;`;
            }
            td.textContent = cellValue;
          }
          // 3. If cell contains markdown-style link syntax [Label](https://url), render a real <a> tag
          //    built from the extracted label + url only — never via innerHTML, so no arbitrary
          //    HTML/JS in a cell can ever execute. Required format: [Label](https://domain.com)
          else if (parseMarkdownLink(cellValue)) {
            const link = parseMarkdownLink(cellValue);
            const a = document.createElement("a");
            a.href = link.url;
            a.textContent = link.label;
            a.target = "_blank";
            a.rel = "noopener noreferrer";
            a.className = "fst-cell-link";
            td.appendChild(a);
          }
          // 4. Default plain text rendering fallback
          else {
            td.textContent = cellValue;
          }
 
          tr.appendChild(td);
        });
        frag.appendChild(tr);
      });
      tbodyEl.appendChild(frag);
    }
 
    const totalPagesForLabel = Math.max(1, Math.ceil(filtered.length / ROWS_PER_PAGE));
    countEl.textContent = `${filtered.length} of ${rows.length} rows`;
    pageLabelEl.textContent = `Page ${currentPage} of ${totalPagesForLabel}`;
    prevBtn.disabled = currentPage <= 1;
    nextBtn.disabled = currentPage >= totalPagesForLabel;
  }
 
  resetBtn.addEventListener("click", () => {
    activeFilters = {};
    filtersEl.querySelectorAll(".fst-pill.selected").forEach(p => p.classList.remove("selected"));
    currentPage = 1;
    render();
  });

  prevBtn.addEventListener("click", () => {
    currentPage -= 1;
    render();
  });

  nextBtn.addEventListener("click", () => {
    currentPage += 1;
    render();
  });

  searchInput.addEventListener("input", () => {
    searchTerm = searchInput.value.trim().toLowerCase();
    currentPage = 1;
    render();
  });
 
  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }
  function escapeAttr(s) { return escapeHtml(s); }
})();
</script>
